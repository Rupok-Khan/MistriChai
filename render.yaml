services:
  - type: web
    name: mistrichai-api
    runtime: node
    plan: starter
    region: singapore
    rootDir: server
    buildCommand: npm ci
    preDeployCommand: npm run db:init
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    maxShutdownDelaySeconds: 30
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_CONNECTION_LIMIT
        value: "10"
      - key: DB_SSL
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: ADMIN_JWT_EXPIRES_IN
        value: 12h
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: CROSS_SITE_COOKIES
        value: "true"
      - key: UPLOAD_DIR
        value: /var/data/uploads
    disk:
      name: mistrichai-uploads
      mountPath: /var/data
      sizeGB: 1
